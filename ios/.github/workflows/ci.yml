name: iOS CI

on:
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - '.github/workflows/ios-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'ios/**'

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  lint:
    name: Lint (SwiftLint)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        working-directory: ios
        run: swiftlint lint --strict

  test:
    name: Test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_15.2.app

      - name: Run tests
        working-directory: ios
        run: |
          xcodebuild test \
            -scheme Sigil \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro,OS=17.2' \
            -enableCodeCoverage YES \
            -derivedDataPath DerivedData

      - name: Generate coverage report
        working-directory: ios
        run: |
          xcrun xccov view --report DerivedData/Logs/Test/*.xcresult > coverage.txt
          cat coverage.txt

      - name: Coverage check
        working-directory: ios
        run: |
          # iOS coverage: 80% line / 70% branch (Maren §10)
          coverage=$(xcrun xccov view --report DerivedData/Logs/Test/*.xcresult | \
            grep -E "^\s+[0-9]+\.[0-9]+%" | head -1 | awk '{print $1}' | sed 's/%//')
          echo "Coverage: ${coverage}%"
          if (( $(echo "$coverage < 80.0" | bc -l) )); then
            echo "Coverage ${coverage}% below threshold 80%"
            exit 1
          fi

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./ios/coverage.txt
          flags: ios
          fail_ci_if_error: false

  ui-tests:
    name: UI Tests (XCUITest)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_15.2.app

      - name: Run UI tests
        working-directory: ios
        run: |
          xcodebuild test \
            -scheme SigilUITests \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro,OS=17.2' \
            -derivedDataPath DerivedData

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-results
          path: ios/DerivedData/Logs/Test/*.xcresult

  a11y-scan:
    name: Accessibility Scan (Accessibility Inspector)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_15.2.app

      - name: Build for testing
        working-directory: ios
        run: |
          xcodebuild build-for-testing \
            -scheme Sigil \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro,OS=17.2' \
            -derivedDataPath DerivedData

      - name: Run accessibility audit
        working-directory: ios
        run: |
          # Placeholder for Accessibility Inspector automation
          # Full implementation requires XCUITest accessibility audit
          echo "Accessibility scan placeholder - requires XCUITest integration"
          # Expected: 15 Aria blockers from beacon-prd.md §10

  tdd-audit:
    name: TDD Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin main:main || true

      - name: Run TDD audit
        working-directory: ios
        run: bash ../../scripts/tdd-audit.sh origin/main

  security:
    name: Security Scan
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_15.2.app

      - name: Run Xcode security checks
        working-directory: ios
        run: |
          # Xcode static analyzer
          xcodebuild analyze \
            -scheme Sigil \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro,OS=17.2'

      - name: Check for hardcoded secrets
        working-directory: ios
        run: |
          # Scan for common secret patterns
          ! grep -r -E "api[_-]?key|secret|password|token" --include="*.swift" . || \
            (echo "Potential secrets found in source code" && exit 1)

  build:
    name: Build
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_15.2.app

      - name: Build
        working-directory: ios
        run: |
          xcodebuild build \
            -scheme Sigil \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro,OS=17.2' \
            -configuration Release

  all-checks:
    name: All Checks Passed
    needs: [lint, test, ui-tests, a11y-scan, tdd-audit, security, build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs succeeded
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]] || \
             [[ "${{ needs.test.result }}" != "success" ]] || \
             [[ "${{ needs.ui-tests.result }}" != "success" ]] || \
             [[ "${{ needs.a11y-scan.result }}" != "success" ]] || \
             [[ "${{ needs.tdd-audit.result }}" != "success" ]] || \
             [[ "${{ needs.security.result }}" != "success" ]] || \
             [[ "${{ needs.build.result }}" != "success" ]]; then
            echo "One or more checks failed"
            exit 1
          fi
          echo "All iOS checks passed!"
