name: Release to TestFlight

on:
  push:
    tags:
      - 'ios-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-upload:
    name: Build and Upload to TestFlight
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_15.2.app

      - name: Extract version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/ios-v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/ios-v}
          else
            VERSION="0.1.0-dev.${GITHUB_SHA::7}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Install certificates
        env:
          CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Create keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          # Import certificate
          echo "$CERTIFICATE_P12" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm certificate.p12

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      - name: Build archive
        working-directory: ios
        run: |
          xcodebuild archive \
            -scheme Sigil \
            -configuration Release \
            -archivePath build/Sigil.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_STYLE=Manual

      - name: Export IPA
        working-directory: ios
        run: |
          xcodebuild -exportArchive \
            -archivePath build/Sigil.xcarchive \
            -exportPath build \
            -exportOptionsPlist ExportOptions.plist

      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APPSTORE_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APPSTORE_API_KEY }}
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file ios/build/Sigil.ipa \
            --apiKey $APP_STORE_CONNECT_API_KEY_ID \
            --apiIssuer $APP_STORE_CONNECT_API_ISSUER_ID

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain build.keychain || true

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-and-upload
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/ios-v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION="ios-dev-${GITHUB_SHA::7}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Sigil iOS ${{ steps.version.outputs.version }}
          body: |
            ## Sigil iOS ${{ steps.version.outputs.version }}

            **TestFlight:** Build uploaded to TestFlight for internal testing.

            **Install:** Join the TestFlight beta via invite link.

            **Changes:**
            - See commit history for details
          draft: false
          prerelease: true
